<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Lucid — Dream Journal</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <nav class="top-nav">
        <a href="/" class="nav-brand">
            <div class="nav-logo">✦</div>
            <span class="nav-brand-text">Lucid</span>
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <a href="/feed" class="nav-link">Feed</a>
        </div>
        <div class="nav-right">
            <a href="/login" class="btn btn-ghost btn-sm">Sign In</a>
        </div>
    </nav>

    <div class="form-container">
        <section class="form-card">
            <div class="form-header">
                <h2>Create your account</h2>
                <p>Begin your journey into the world of dreams</p>
            </div>

            <form action="/signup" method="POST" id="signupForm" novalidate>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input id="username" type="text" name="username" placeholder="Choose a unique username" required autocomplete="username" minlength="3" maxlength="50">
                    <div class="field-helper">3-50 characters, letters and numbers only</div>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" type="email" name="email" placeholder="your@email.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" type="password" name="password" placeholder="Create a strong password" required autocomplete="new-password" minlength="6">
                    <div class="field-helper">At least 6 characters</div>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input id="confirm_password" type="password" name="confirm_password" placeholder="Repeat your password" required autocomplete="new-password">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-lg btn-full">Create Account</button>
                </div>

                <div class="form-footer">
                    <p>Already have an account? <a href="/login">Sign in</a></p>
                </div>
            </form>
        </section>
    </div>
</div>

<script>
(function() {
    const form = document.getElementById('signupForm');
    form.addEventListener('submit', function(e) {
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm_password').value;
        if (password !== confirm) {
            e.preventDefault();
            alert('Passwords do not match!');
            return;
        }
        if (password.length < 6) {
            e.preventDefault();
            alert('Password must be at least 6 characters.');
        }
    });
})();
</script>
</body>
</html>
