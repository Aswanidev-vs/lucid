<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Lucid</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <nav class="top-nav">
            <a href="/" class="nav-brand">
                <div class="nav-logo">✦</div>
                <span class="nav-brand-text">Lucid</span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/feed" class="nav-link">Feed</a>
            </div>
            <div class="nav-right">
                {{if .IsLoggedIn}}
                    <form action="/logout" method="POST" style="display:inline">
                        <button type="submit" class="btn btn-ghost btn-sm">Logout</button>
                    </form>
                {{else}}
                    <a href="/signup" class="btn btn-primary btn-sm">Create Account</a>
                {{end}}
            </div>
        </nav>

        <div class="form-container">
            <section class="form-card">
                <div class="form-header">
                    <h2>Welcome back</h2>
                    <p>Return to your dream sanctuary</p>
                </div>

                <form action="/login" method="POST" id="loginForm" novalidate>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input id="email" type="email" name="email" placeholder="your@email.com" required autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input id="password" type="password" name="password" placeholder="Enter your password" required autocomplete="current-password" minlength="6">
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary btn-lg btn-full">Sign In</button>
                    </div>

                    <div class="form-footer">
                        <p>Don't have an account? <a href="/signup">Create one</a></p>
                    </div>
                </form>
            </section>
        </div>
    </div>

    <script>
    (function() {
        const form = document.getElementById('loginForm');
        form.addEventListener('submit', function(e) {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) {
                e.preventDefault();
                alert('Please fill in all fields.');
            }
        });
    })();
    </script>
</body>
</html>
