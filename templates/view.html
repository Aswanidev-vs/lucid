<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} — Dream Journal</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <header class="hero-section">
        <div class="brand-mark">
            <h1 class="brand-title">{{.Title}}</h1>
            <p class="brand-subtitle">Dream details</p>
        </div>
        <nav class="nav-links">
            <a class="btn btn-ghost" href="/dreams">← Back to dreams</a>
            <a class="btn btn-secondary" href="/dreams/{{.Id}}/edit">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
                Edit
            </a>
        </nav>
    </header>

    <div class="dream-detail">
        <article class="dream-full-card">
            <div class="dream-header">
                <div class="dream-meta">
                    {{if .Mood}}
                        <div class="mood-badge" data-mood="{{.Mood}}">
                            <span class="mood-dot" aria-hidden="true"></span>
                            <span class="mood-text">{{.Mood}}</span>
                        </div>
                    {{else}}
                        <div class="mood-badge mood-badge--empty">
                            <span class="mood-dot" aria-hidden="true"></span>
                            <span class="mood-text">No mood recorded</span>
                        </div>
                    {{end}}
                    {{if .IsPublic}}
                        <div class="visibility-badge">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            Public Dream
                        </div>
                    {{else}}
                        <div class="visibility-badge visibility-private">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <circle cx="12" cy="16" r="1"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                            Private Dream
                        </div>
                    {{end}}
                    <span class="char-counter">{{len .Content}} characters</span>
                </div>
            </div>

            <div class="dream-content-full">
                {{.Content}}
            </div>

            <div class="dream-footer-full">
                <time class="dream-date" datetime="{{.CreatedAt}}">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                    Recorded on {{.CreatedAt}}
                </time>
                <div class="dream-actions">
                    <form action="/dreams/{{.Id}}" method="POST" style="display: inline;">
                        <input type="hidden" name="title" value="{{.Title}}">
                        <input type="hidden" name="content" value="{{.Content}}">
                        <input type="hidden" name="mood" value="{{.Mood}}">
                        <input type="hidden" name="is_public" value="{{if .IsPublic}}off{{else}}on{{end}}">
                        <button type="submit" class="btn {{if .IsPublic}}btn-secondary{{else}}btn-primary{{end}}" title="{{if .IsPublic}}Make private{{else}}Make public{{end}}">
                            {{if .IsPublic}}
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                    <circle cx="12" cy="16" r="1"/>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                                Make Private
                            {{else}}
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                                Make Public
                            {{end}}
                        </button>
                    </form>
                    <form action="/dreams/{{.Id}}/delete" method="POST" onsubmit="return confirm('Are you sure you want to delete this dream?')" style="display: inline;">
                        <button type="submit" class="btn btn-danger">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"/>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                <line x1="10" y1="11" x2="10" y2="17"/>
                                <line x1="14" y1="11" x2="14" y2="17"/>
                            </svg>
                            Delete
                        </button>
                    </form>
                </div>
            </div>
        </article>
    </div>

</div>

</body>
</html>
